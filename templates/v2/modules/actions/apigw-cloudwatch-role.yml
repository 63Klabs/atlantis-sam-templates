# -- API Gateway CloudWatch Logs Role --
# Parent template must define condition: EnableApiGatewayLogging
#
# In order to push API Gateway logs to CloudWatch, a role must be created
# at the account level and then added to API Gateway via the Account
# resource. This is a one-time, per-account, per-region configuration.
#
# This module will:
#   1. Create a service role allowing API Gateway to write to CloudWatch
#
# See https://docs.aws.amazon.com/apigateway/latest/developerguide/set-up-logging.html

Type: AWS::IAM::Role
Condition: EnableApiGatewayLogging
Properties:
  AssumeRolePolicyDocument:
    Statement:
      - Effect: Allow
        Principal:
          Service: apigateway.amazonaws.com
        Action: sts:AssumeRole
  ManagedPolicyArns:
    - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
