  # -- Prefix-based CloudFormation Service Role for Full Network Management --
  # Parent template must define parameters:
  #   Prefix, PrefixUpper, S3BucketNameOrgPrefix, ServiceRolePath,
  #   PermissionsBoundaryArn, GroupNames, RoleNames, UserNames
  # Parent template must define conditions:
  #   HasPermissionsBoundaryArn, HasGroupNames, HasRoleNames, HasUserNames
  # Parent template must include (before this module):
  #   modules/management-roles/network-cloudfront-mgmt-policy.yml
  #   modules/management-roles/network-route53-mgmt-policy.yml

  # ---------------------------------------------------------------------------
  # -- Full Network Management Service Role (CloudFront + Route53) --
  # --
  # Service role for CloudFormation to deploy and manage the complete
  # network stack: CloudFront distributions, OAC, cache policies,
  # API Gateway custom domains, AND Route53 DNS records.
  # --

  PrefixBasedCloudFormationNetworkFullMgmtServiceRole:
    Type: AWS::IAM::Role
    Properties:
      Path: !Ref ServiceRolePath
      RoleName: !Sub "${PrefixUpper}-CloudFormation-Service-Role-Network-Full-Mgmt"
      Description: !Sub "Service Role to manage CloudFront, Route53, and API Gateway custom domains for prefix ${Prefix}"
      PermissionsBoundary: !If [HasPermissionsBoundaryArn, !Ref PermissionsBoundaryArn, !Ref 'AWS::NoValue']
      ManagedPolicyArns:
        - !Ref PrefixBasedNetworkCloudFrontMgmtPolicy
        - !Ref PrefixBasedNetworkRoute53MgmtPolicy
      AssumeRolePolicyDocument:
        Statement:
          - Sid: "CloudFormationTrustPolicy"
            Effect: Allow
            Action: sts:AssumeRole
            Principal:
              Service:
                - cloudformation.amazonaws.com

  # ---------------------------------------------------------------------------
  # -- Managed Policy for Full Network Management --
  # --

  PrefixBasedNetworkFullMgmtManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "Managed Policy to deploy full network stacks (CloudFront + Route53) under prefix ${Prefix}. Can be attached to Roles, Groups, or Users."
      Path: !Ref ServiceRolePath
      Groups: !If [HasGroupNames, !Ref GroupNames, !Ref 'AWS::NoValue']
      Roles: !If [HasRoleNames, !Ref RoleNames, !Ref 'AWS::NoValue']
      Users: !If [HasUserNames, !Ref UserNames, !Ref 'AWS::NoValue']
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowUserToPassSpecificCloudFormationServiceRole"
            Effect: "Allow"
            Action:
              - iam:GetRole
              - iam:PassRole
            Resource: !GetAtt PrefixBasedCloudFormationNetworkFullMgmtServiceRole.Arn
            Condition:
              StringEquals:
                "iam:PassedToService": "cloudformation.amazonaws.com"
