# -- Prefix-based CloudFormation Service Role for Full Network Management --
# Parent template must define parameters:
#   Prefix, PrefixUpper, S3BucketNameOrgPrefix, ServiceRolePath,
#   PermissionsBoundaryArn, GroupNames, RoleNames, UserNames
# Parent template must define conditions:
#   HasPermissionsBoundaryArn, HasGroupNames, HasRoleNames, HasUserNames
# Parent template must include (before this module):
#   modules/management-roles/network-cloudfront-mgmt-policy.yml
#   modules/management-roles/network-route53-mgmt-policy.yml
# NOTE: AWS::Include does not support YAML shorthand tags (!Sub, !Ref, etc.)
#       All intrinsic functions must use long-form syntax (Fn::Sub, Ref, etc.)

# ---------------------------------------------------------------------------
# -- Full Network Management Service Role (CloudFront + Route53) --
# --
# Service role for CloudFormation to deploy and manage the complete
# network stack: CloudFront distributions, OAC, cache policies,
# API Gateway custom domains, AND Route53 DNS records.
# --

Type: AWS::IAM::Role
Properties:
  Path:
    Ref: ServiceRolePath
  RoleName:
    Fn::Sub: "${PrefixUpper}-CloudFormation-Service-Role-Network-Full-Mgmt"
  Description:
    Fn::Sub: "Service Role to manage CloudFront, Route53, and API Gateway custom domains for prefix ${Prefix}"
  PermissionsBoundary:
    Fn::If:
      - HasPermissionsBoundaryArn
      - Ref: PermissionsBoundaryArn
      - Ref: "AWS::NoValue"
  ManagedPolicyArns:
    - Ref: PrefixBasedNetworkCloudFrontMgmtPolicy
    - Ref: PrefixBasedNetworkRoute53MgmtPolicy
  AssumeRolePolicyDocument:
    Statement:
      - Sid: "CloudFormationTrustPolicy"
        Effect: Allow
        Action: sts:AssumeRole
        Principal:
          Service:
            - cloudformation.amazonaws.com
