# -- Prefix-based CloudFormation Service Role for Pipeline Management --
# Parent template must define parameters:
#   Prefix, PrefixUpper, S3BucketNameOrgPrefix, ServiceRolePath, RolePath,
#   PermissionsBoundaryArn, GroupNames, RoleNames, UserNames
# Parent template must define conditions:
#   UseS3BucketNameOrgPrefix, HasPermissionsBoundaryArn,
#   HasGroupNames, HasRoleNames, HasUserNames
# NOTE: AWS::Include does not support YAML shorthand tags (!Sub, !Ref, etc.)
#       All intrinsic functions must use long-form syntax (Fn::Sub, Ref, etc.)

# ---------------------------------------------------------------------------
# -- Prefix-based IAM Service Role --
# --
# When deploying a Pipeline Stack, it must be given a service role.
# --
# Practice The Principle of Least Privilege
# IAM policies should be scoped down to give only necessary actions on
# resources specific to this prefix.
# --

Type: AWS::IAM::Role
Properties:
  Path:
    Ref: ServiceRolePath
  RoleName:
    Fn::Sub: "${PrefixUpper}-CloudFormation-Service-Role-Pipeline-Management"
  Description:
    Fn::Sub: "Service Role to Create and Manage an AWS CodePipeline for application projects under prefix ${Prefix}"
  PermissionsBoundary:
    Fn::If:
      - HasPermissionsBoundaryArn
      - Ref: PermissionsBoundaryArn
      - Ref: "AWS::NoValue"

  AssumeRolePolicyDocument:
    Statement:
    - Sid: "EventTrustPolicy"
      Effect: Allow
      Action: sts:AssumeRole
      Principal:
        Service:
        - cloudformation.amazonaws.com

  Policies:
  - PolicyName:
      Fn::Sub: "${PrefixUpper}-CloudFormation-Service-Role-Pipeline-Management-Policy"
    PolicyDocument:
      Version: "2012-10-17"
      Statement:

      - Sid: ManageEventRulesByResourcePrefix
        Effect: Allow
        Action:
        - events:PutTargets
        - events:RemoveTargets
        - events:PutRule
        - events:DeleteRule
        - events:DescribeRule
        - events:TagResource
        - events:UntagResource
        Resource:
        - Fn::Sub: "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${Prefix}-*"

      - Sid: ManageSnsTopicsByResourcePrefix
        Effect: Allow
        Action:
        - sns:CreateTopic
        - sns:DeleteTopic
        - sns:GetTopicAttributes
        - sns:SetTopicAttributes
        - sns:Subscribe
        - sns:Unsubscribe
        - sns:TagResource
        - sns:UntagResource
        - sns:ListSubscriptionsByTopic
        - sns:ListTagsForResource
        Resource:
        - Fn::Sub: "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:${Prefix}-*"

      - Sid: ManageCodeStarNotificationsByResourcePrefix
        Effect: Allow
        Action:
        - codestar-notifications:CreateNotificationRule
        - codestar-notifications:DeleteNotificationRule
        - codestar-notifications:DescribeNotificationRule
        - codestar-notifications:UpdateNotificationRule
        - codestar-notifications:Subscribe
        - codestar-notifications:Unsubscribe
        - codestar-notifications:TagResource
        - codestar-notifications:UntagResource
        - codestar-notifications:ListTagsForResource
        Resource:
        - Fn::Sub: "arn:aws:codestar-notifications:${AWS::Region}:${AWS::AccountId}:notificationrule/*"

      - Sid: ManageCloudFormationStacksByResourcePrefix
        Effect: Allow
        Action:
        - cloudformation:*Stack*
        - cloudformation:CreateChangeSet
        - cloudformation:ExecuteChangeSet
        - cloudformation:DeleteChangeSet
        - cloudformation:DescribeChangeSet
        - cloudformation:GetTemplate
        - cloudformation:GetTemplateSummary
        Resource:
          Fn::Sub: "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${Prefix}-*"

      - Sid: ManageBucketsByResourcePrefix
        Effect: Allow
        Action:
        - s3:*
        Resource:
        - Fn::Sub:
          - "arn:aws:s3:::${BucketPrefix}-*"
          - BucketPrefix:
              Fn::If: # Deprecated
                - UseS3BucketNameOrgPrefix
                - Fn::Sub: "${S3BucketNameOrgPrefix}-${Prefix}"
                - Fn::Sub: "${Prefix}-${AWS::Region}-${AWS::AccountId}"
        - Fn::Sub:
          - "arn:aws:s3:::${BucketPrefix}-*"
          - BucketPrefix:
              Fn::If: # Preferred as it aligns with regional bucket naming
                - UseS3BucketNameOrgPrefix
                - Fn::Sub: "${S3BucketNameOrgPrefix}-${Prefix}"
                - Fn::Sub: "${Prefix}-${AWS::AccountId}-${AWS::Region}"
        - Fn::Sub:
          - "arn:aws:s3:::${BucketPrefix}-*/*"
          - BucketPrefix:
              Fn::If: # Deprecated
                - UseS3BucketNameOrgPrefix
                - Fn::Sub: "${S3BucketNameOrgPrefix}-${Prefix}"
                - Fn::Sub: "${Prefix}-${AWS::Region}-${AWS::AccountId}"
        - Fn::Sub:
          - "arn:aws:s3:::${BucketPrefix}-*/*"
          - BucketPrefix:
              Fn::If: # Preferred as it aligns with regional bucket naming
                - UseS3BucketNameOrgPrefix
                - Fn::Sub: "${S3BucketNameOrgPrefix}-${Prefix}"
                - Fn::Sub: "${Prefix}-${AWS::AccountId}-${AWS::Region}"

      - Sid: ManageLogsByResourcePrefix
        Effect: Allow
        Action:
        - logs:*
        Resource:
          Fn::Sub: "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${Prefix}-*"

      - Sid: ManageCodePipelineByResourcePrefix
        Effect: Allow
        Action:
        - codepipeline:*
        Resource:
          Fn::Sub: "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Prefix}-*"

      - Sid: ManageCodeBuildByResourcePrefix
        Effect: Allow
        Action:
        - codebuild:*
        Resource:
          Fn::Sub: "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${Prefix}-*"

      - Sid: PassAndDeleteWorkerRolesByResourcePrefix
        Effect: Allow
        Action:
        - iam:PassRole
        - iam:DeleteRole
        Resource:
          Fn::Sub: "arn:aws:iam::${AWS::AccountId}:role${RolePath}${Prefix}-Worker-*"

      - Sid: IAMReadOnly
        Effect: Allow
        Action:
        - iam:Get*
        - iam:List*
        Resource: 
        - Fn::Sub: "arn:aws:iam::${AWS::AccountId}:role/*"
        - Fn::Sub: "arn:aws:iam::${AWS::AccountId}:policy/*"

      - Sid: ManageWorkerRolesByResourcePrefix
        Effect: Allow
        Action:
        - iam:AttachRolePolicy
        - iam:CreateRole
        - iam:DeleteRolePolicy
        - iam:DetachRolePolicy
        - iam:PutRolePolicy
        - iam:UntagRole
        - iam:TagRole
        - iam:UpdateRoleDescription
        Resource:
          Fn::Sub: "arn:aws:iam::${AWS::AccountId}:role${RolePath}${Prefix}-Worker-*"
        Condition: 
          Fn::If:
            - HasPermissionsBoundaryArn
            - StringEquals:
                "iam:PermissionsBoundary":
                  Ref: PermissionsBoundaryArn
            - Ref: "AWS::NoValue"

      - Sid: InspectServiceRole
        Effect: Allow
        Action:
        - iam:ListAttachedRolePolicies
        Resource:
          Fn::Sub: "arn:aws:iam::${AWS::AccountId}:role${RolePath}${PrefixUpper}-CloudFormation-Service-Role-*"
