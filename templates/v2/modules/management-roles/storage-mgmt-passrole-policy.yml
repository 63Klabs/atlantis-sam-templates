# -- PassRole Managed Policy for Storage Management --
# Parent must name the storage role resource 'PrefixBasedCloudFormationStorageMgmtServiceRole'
# Parent template must define parameters:
#   Prefix, ServiceRolePath, GroupNames, RoleNames, UserNames
# Parent template must define conditions:
#   HasGroupNames, HasRoleNames, HasUserNames
# NOTE: AWS::Include does not support YAML shorthand tags (!Sub, !Ref, etc.)
#       All intrinsic functions must use long-form syntax (Fn::Sub, Ref, etc.)

Type: AWS::IAM::ManagedPolicy
Properties:
  Description:
    Fn::Sub: "Managed Policy to Create and Manage an AWS S3, DynamoDb, and application access policies under prefix ${Prefix}. Can be attached to Roles, Groups, or Users."
  Path:
    Ref: ServiceRolePath
  Groups:
    Fn::If:
      - HasGroupNames
      - Ref: GroupNames
      - Ref: "AWS::NoValue"
  Roles:
    Fn::If:
      - HasRoleNames
      - Ref: RoleNames
      - Ref: "AWS::NoValue"
  Users:
    Fn::If:
      - HasUserNames
      - Ref: UserNames
      - Ref: "AWS::NoValue"
  PolicyDocument:
    Version: "2012-10-17"
    Statement:
      - Sid: "AllowUserToPassSpecificCloudFormationServiceRole"
        Effect: "Allow"
        Action:
          - iam:GetRole
          - iam:PassRole
        Resource:
          Fn::GetAtt: [PrefixBasedCloudFormationStorageMgmtServiceRole, Arn]
        Condition:
          StringEquals:
            "iam:PassedToService": "cloudformation.amazonaws.com"
