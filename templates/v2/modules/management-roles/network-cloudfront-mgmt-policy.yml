# -- Prefix-based Policy: Network CloudFront Management --
# Parent template must define parameters:
#   Prefix, PrefixUpper, S3BucketNameOrgPrefix, ServiceRolePath
# Parent template must define conditions:
#   UseS3BucketNameOrgPrefix
# NOTE: AWS::Include does not support YAML shorthand tags (!Sub, !Ref, etc.)
#       All intrinsic functions must use long-form syntax (Fn::Sub, Ref, etc.)

# ---------------------------------------------------------------------------
# -- CloudFront and API Gateway Management Policy --
# --
# Allows CloudFormation service roles to manage CloudFront distributions,
# OAC, cache policies, API Gateway V2 domain names and mappings, and
# related CloudFormation stacks scoped by prefix.
# --
# This is the "developer" policy — it does NOT include Route53 permissions.
# --

Type: AWS::IAM::ManagedPolicy
Properties:
  ManagedPolicyName:
    Fn::Sub: "${PrefixUpper}-CfnSvcRole-Network-CloudFront-Mgmt"
  Description:
    Fn::Sub: "Allows CloudFormation service roles to manage CloudFront distributions, OAC, cache policies, and API Gateway V2 custom domains for prefix ${Prefix}"
  Path:
    Ref: ServiceRolePath
  PolicyDocument:
    Version: "2012-10-17"
    Statement:

      # ------------------------------------------------------------------
      # CloudFormation Stack Management (scoped by prefix)
      # ------------------------------------------------------------------

      - Sid: ManageCloudFormationStacksByResourcePrefix
        Effect: Allow
        Action:
          - cloudformation:*Stack*
          - cloudformation:CreateChangeSet
          - cloudformation:ExecuteChangeSet
          - cloudformation:DeleteChangeSet
          - cloudformation:DescribeChangeSet
          - cloudformation:GetTemplate
          - cloudformation:GetTemplateSummary
        Resource:
          Fn::Sub: "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${Prefix}-*"

      - Sid: AllowTransformOperations
        Effect: Allow
        Action:
          - cloudformation:CreateChangeSet
        Resource:
          - "arn:aws:cloudformation:*:aws:transform/Serverless-2016-10-31"
          - "arn:aws:cloudformation:*:aws:transform/LanguageExtensions"
          - "arn:aws:cloudformation:*:aws:transform/Include"

      # ------------------------------------------------------------------
      # CloudFront Distribution CRUD
      # CloudFront is a global service; resources use wildcard but are
      # scoped by the stack prefix via CloudFormation.
      # ------------------------------------------------------------------

      - Sid: CloudFrontDistributionCRUD
        Effect: Allow
        Action:
          - cloudfront:CreateDistribution
          - cloudfront:CreateDistributionWithTags
          - cloudfront:UpdateDistribution
          - cloudfront:DeleteDistribution
          - cloudfront:GetDistribution
          - cloudfront:GetDistributionConfig
          - cloudfront:ListDistributions
          - cloudfront:TagResource
          - cloudfront:UntagResource
          - cloudfront:ListTagsForResource
        Resource: "*"

      # ------------------------------------------------------------------
      # CloudFront Origin Access Control
      # ------------------------------------------------------------------

      - Sid: CloudFrontOACCRUD
        Effect: Allow
        Action:
          - cloudfront:CreateOriginAccessControl
          - cloudfront:UpdateOriginAccessControl
          - cloudfront:DeleteOriginAccessControl
          - cloudfront:GetOriginAccessControl
          - cloudfront:GetOriginAccessControlConfig
          - cloudfront:ListOriginAccessControls
        Resource: "*"

      # ------------------------------------------------------------------
      # CloudFront Cache Policies
      # ------------------------------------------------------------------

      - Sid: CloudFrontCachePolicyCRUD
        Effect: Allow
        Action:
          - cloudfront:CreateCachePolicy
          - cloudfront:UpdateCachePolicy
          - cloudfront:DeleteCachePolicy
          - cloudfront:GetCachePolicy
          - cloudfront:GetCachePolicyConfig
          - cloudfront:ListCachePolicies
        Resource: "*"

      # ------------------------------------------------------------------
      # CloudFront Functions (for viewer-request/response associations)
      # ------------------------------------------------------------------

      - Sid: CloudFrontFunctionRead
        Effect: Allow
        Action:
          - cloudfront:GetFunction
          - cloudfront:DescribeFunction
          - cloudfront:ListFunctions
        Resource: "*"

      # ------------------------------------------------------------------
      # API Gateway V2 Custom Domain and Mapping
      # Used when API Gateway is placed behind CloudFront or has its
      # own custom domain.
      # ------------------------------------------------------------------

      - Sid: ApiGatewayV2DomainCRUD
        Effect: Allow
        Action:
          - apigateway:POST
          - apigateway:GET
          - apigateway:PATCH
          - apigateway:DELETE
          - apigateway:PUT
        Resource:
          - Fn::Sub: "arn:aws:apigateway:${AWS::Region}::/domainnames"
          - Fn::Sub: "arn:aws:apigateway:${AWS::Region}::/domainnames/*"

      # ------------------------------------------------------------------
      # S3 Bucket Read (for log bucket and origin verification)
      # ------------------------------------------------------------------

      - Sid: S3BucketReadForLogging
        Effect: Allow
        Action:
          - s3:GetBucketLocation
          - s3:ListBucket
        Resource:
          - Fn::Sub:
            - "arn:aws:s3:::${BucketPrefix}-*"
            - BucketPrefix:
                Fn::If:
                  - UseS3BucketNameOrgPrefix
                  - Fn::Sub: "${S3BucketNameOrgPrefix}-${Prefix}"
                  - Fn::Sub: "${Prefix}-${AWS::AccountId}-${AWS::Region}"

      # ------------------------------------------------------------------
      # ACM Certificate Read (for CloudFront and API Gateway)
      # ------------------------------------------------------------------

      - Sid: AcmCertificateRead
        Effect: Allow
        Action:
          - acm:DescribeCertificate
          - acm:ListCertificates
          - acm:GetCertificate
          - acm:ListTagsForCertificate
        Resource: "*"
