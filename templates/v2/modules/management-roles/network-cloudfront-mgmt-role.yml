# -- Prefix-based CloudFormation Service Role for Network CloudFront Management --
# Parent template must define parameters:
#   Prefix, PrefixUpper, S3BucketNameOrgPrefix, ServiceRolePath,
#   PermissionsBoundaryArn, GroupNames, RoleNames, UserNames
# Parent template must define conditions:
#   HasPermissionsBoundaryArn, HasGroupNames, HasRoleNames, HasUserNames
# Parent template must include (before this module):
#   modules/management-roles/network-cloudfront-mgmt-policy.yml
# NOTE: AWS::Include does not support YAML shorthand tags (!Sub, !Ref, etc.)
#       All intrinsic functions must use long-form syntax (Fn::Sub, Ref, etc.)

# ---------------------------------------------------------------------------
# -- Network CloudFront Management Service Role (Developer) --
# --
# Service role for CloudFormation to deploy and manage CloudFront
# distributions, OAC, cache policies, and API Gateway custom domains.
# Does NOT include Route53 permissions.
# --

Type: AWS::IAM::Role
Properties:
  Path:
    Ref: ServiceRolePath
  RoleName:
    Fn::Sub: "${PrefixUpper}-CloudFormation-Service-Role-Network-CloudFront-Mgmt"
  Description:
    Fn::Sub: "Service Role to manage CloudFront distributions and API Gateway custom domains for prefix ${Prefix} (no Route53)"
  PermissionsBoundary:
    Fn::If:
      - HasPermissionsBoundaryArn
      - Ref: PermissionsBoundaryArn
      - Ref: "AWS::NoValue"
  ManagedPolicyArns:
    - Ref: PrefixBasedNetworkCloudFrontMgmtPolicy
  AssumeRolePolicyDocument:
    Statement:
      - Sid: "CloudFormationTrustPolicy"
        Effect: Allow
        Action: sts:AssumeRole
        Principal:
          Service:
            - cloudformation.amazonaws.com
