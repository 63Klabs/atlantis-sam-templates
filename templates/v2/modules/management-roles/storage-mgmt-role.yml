  # -- Prefix-based CloudFormation Service Role for Storage Management --
  # Parent template must define parameters:
  #   Prefix, PrefixUpper, S3BucketNameOrgPrefix, ServiceRolePath, RolePath,
  #   PermissionsBoundaryArn, GroupNames, RoleNames, UserNames
  # Parent template must define conditions:
  #   UseS3BucketNameOrgPrefix, HasPermissionsBoundaryArn,
  #   HasGroupNames, HasRoleNames, HasUserNames

  # ---------------------------------------------------------------------------
  # -- Prefix-based IAM Service Role --
  # --
  # When deploying a Storage Stack, it must be given a service role.
  # --
  # Practice The Principle of Least Privilege
  # IAM policies should be scoped down to give only necessary actions on
  # resources specific to this prefix.
  # --

  PrefixBasedCloudFormationStorageMgmtServiceRole:
    Type: AWS::IAM::Role
    Properties:
      Path: !Ref ServiceRolePath
      RoleName: !Sub "${PrefixUpper}-CloudFormation-Service-Role-Storage-Management"
      Description: !Sub "Service Role to Create and Manage an AWS S3, DynamoDb, and application access policies under prefix ${Prefix}"
      PermissionsBoundary: !If [HasPermissionsBoundaryArn, !Ref PermissionsBoundaryArn, !Ref 'AWS::NoValue' ]

      AssumeRolePolicyDocument:
        Statement:
        - Sid: "EventTrustPolicy"
          Effect: Allow
          Action: sts:AssumeRole
          Principal:
            Service:
            - cloudformation.amazonaws.com

      Policies:
      - PolicyName: !Sub "${PrefixUpper}-CloudFormation-Service-Role-Storage-Management-Policy"
        PolicyDocument:
          Version: "2012-10-17"
          Statement:

          - Sid: ManageEventRulesByResourcePrefix
            Effect: Allow
            Action:
            - events:PutTargets
            - events:RemoveTargets
            - events:PutRule
            - events:DeleteRule
            - events:DescribeRule
            - events:TagResource
            - events:UntagResource
            Resource:
            - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${Prefix}-*"

          - Sid: ManageCloudFormationStacksByResourcePrefix
            Effect: Allow
            Action:
            - cloudformation:*Stack*
            - cloudformation:CreateChangeSet
            - cloudformation:ExecuteChangeSet
            - cloudformation:DeleteChangeSet
            - cloudformation:DescribeChangeSet
            - cloudformation:GetTemplate
            - cloudformation:GetTemplateSummary
            Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${Prefix}-*"

          - Sid: ManageBucketsByResourcePrefix
            Effect: Allow
            Action:
            - s3:*
            Resource:
            - !Sub
              - "arn:aws:s3:::${BucketPrefix}-*"
              - BucketPrefix: !If # Deprecated
                - UseS3BucketNameOrgPrefix
                - !Sub "${S3BucketNameOrgPrefix}-${Prefix}"
                - !Sub "${Prefix}-${AWS::Region}-${AWS::AccountId}"
            - !Sub
              - "arn:aws:s3:::${BucketPrefix}-*"
              - BucketPrefix: !If # Preferred as it aligns with regional bucket naming
                - UseS3BucketNameOrgPrefix
                - !Sub "${S3BucketNameOrgPrefix}-${Prefix}"
                - !Sub "${Prefix}-${AWS::AccountId}-${AWS::Region}"
            - !Sub
              - "arn:aws:s3:::${BucketPrefix}-*/*"
              - BucketPrefix: !If # Deprecated
                - UseS3BucketNameOrgPrefix
                - !Sub "${S3BucketNameOrgPrefix}-${Prefix}"
                - !Sub "${Prefix}-${AWS::Region}-${AWS::AccountId}"
            - !Sub
              - "arn:aws:s3:::${BucketPrefix}-*/*"
              - BucketPrefix: !If # Preferred as it aligns with regional bucket naming
                - UseS3BucketNameOrgPrefix
                - !Sub "${S3BucketNameOrgPrefix}-${Prefix}"
                - !Sub "${Prefix}-${AWS::AccountId}-${AWS::Region}"

          # == CloudWatch Alarms ==
          - Sid: "CloudWatchAlarmsLimitedCRUDThisDeploymentOnly"
            Action:
            - cloudwatch:PutMetricAlarm
            - cloudwatch:DeleteAlarm*
            - cloudwatch:TagResource
            - cloudwatch:UntagResource
            - cloudwatch:DescribeAlarms
            Effect: Allow
            Resource:
              - !Sub 'arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${Prefix}-*'

          # == CloudWatch Logs ==
          - Sid: "LogGroupsLimitedCRUDThisDeploymentOnly"
            Action:
            - logs:DeleteLogGroup
            - logs:DeleteRetentionPolicy
            - logs:PutRetentionPolicy
            - logs:CreateLogGroup
            - logs:TagLogGroup # AWS is phasing out, replacing with TagResource
            - logs:UntagLogGroup # AWS is phasing out, replacing with UntagResource
            - logs:TagResource
            - logs:UntagResource
            - logs:ListTagsForResource
            - logs:DescribeLogGroups
            Effect: Allow
            Resource:
            - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${Prefix}-*'

          # ===================================================================
          # Read-only permissions (typically for resources created by other stacks)
          # ===================================================================

          - Sid: "LogGroupsListAll"
            Action:
            - logs:DescribeLogGroups
            - logs:ListTagsLogGroup
            - logs:ListTagsForResource
            Effect: Allow
            Resource: 
            - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*' # cannot scope down to resource as this is a List, but actions are limited

          # == Lambda Function ==
          - Sid: "LambdaCRUDThisDeploymentOnly"
            Action:
            - lambda:*
            Effect: Allow
            Resource:
            - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Prefix}-*'
            - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Prefix}-*:*'
            - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:${Prefix}-*'
            - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:event-source-mapping:*'

          # == DynamoDb ==
          - Sid: "DynamoDbCRUDThisDeploymentOnly"
            Action:
            - dynamodb:*
            Effect: Allow
            Resource:
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${Prefix}-*'

          - Sid: PassAndDeleteWorkerRolesByResourcePrefix
            Effect: Allow
            Action:
            - iam:PassRole
            - iam:DeleteRole
            Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role${RolePath}${Prefix}-Worker-*"

          - Sid: IAMReadOnly
            Effect: Allow
            Action:
            - iam:Get*
            - iam:List*
            Resource: 
            - !Sub "arn:aws:iam::${AWS::AccountId}:role/*"
            - !Sub "arn:aws:iam::${AWS::AccountId}:policy/*"

          - Sid: ManageWorkerRolesByResourcePrefix
            Effect: Allow
            Action:
            - iam:AttachRolePolicy
            - iam:CreateRole
            - iam:DeleteRolePolicy
            - iam:DetachRolePolicy
            - iam:PutRolePolicy
            - iam:UntagRole
            - iam:TagRole
            - iam:UpdateRoleDescription
            Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role${RolePath}${Prefix}-Worker-*"
            Condition: 
              Fn::If:
                - HasPermissionsBoundaryArn
                - StringEquals:
                    "iam:PermissionsBoundary": !Ref PermissionsBoundaryArn
                - !Ref 'AWS::NoValue'

          - Sid: InspectServiceRole
            Effect: Allow
            Action:
            - iam:ListAttachedRolePolicies
            Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role${RolePath}${PrefixUpper}-CloudFormation-Service-Role-*"

  # ---------------------------------------------------------------------------
  # -- Prefix-based Managed Policy for Storage Management --
  # --

  PrefixBasedStorageMgmtManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "Managed Policy to Create and Manage an AWS S3, DynamoDb, and application access policies under prefix ${Prefix}. Can be attached to Roles, Groups, or Users."
      Path: !Ref ServiceRolePath
      Groups: !If [HasGroupNames, !Ref GroupNames, !Ref 'AWS::NoValue' ]
      Roles: !If [HasRoleNames, !Ref RoleNames, !Ref 'AWS::NoValue' ]
      Users: !If [HasUserNames, !Ref UserNames, !Ref 'AWS::NoValue' ]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowUserToPassSpecificCloudFormationServiceRole"
            Effect: "Allow"
            Action:
              - iam:GetRole
              - iam:PassRole 
            Resource: !GetAtt PrefixBasedCloudFormationStorageMgmtServiceRole.Arn
            Condition:
              StringEquals:
                "iam:PassedToService": "cloudformation.amazonaws.com"
