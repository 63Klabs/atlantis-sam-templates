# -- PassRole Managed Policy for Full Network Management --
# Parent must name the network full role resource 'PrefixBasedCloudFormationNetworkFullMgmtServiceRole'
# Parent template must define parameters:
#   Prefix, ServiceRolePath, GroupNames, RoleNames, UserNames
# Parent template must define conditions:
#   HasGroupNames, HasRoleNames, HasUserNames

Type: AWS::IAM::ManagedPolicy
Properties:
  Description: !Sub "Managed Policy to deploy full network stacks (CloudFront + Route53) under prefix ${Prefix}. Can be attached to Roles, Groups, or Users."
  Path: !Ref ServiceRolePath
  Groups: !If [HasGroupNames, !Ref GroupNames, !Ref 'AWS::NoValue']
  Roles: !If [HasRoleNames, !Ref RoleNames, !Ref 'AWS::NoValue']
  Users: !If [HasUserNames, !Ref UserNames, !Ref 'AWS::NoValue']
  PolicyDocument:
    Version: "2012-10-17"
    Statement:
      - Sid: "AllowUserToPassSpecificCloudFormationServiceRole"
        Effect: "Allow"
        Action:
          - iam:GetRole
          - iam:PassRole
        Resource: !GetAtt PrefixBasedCloudFormationNetworkFullMgmtServiceRole.Arn
        Condition:
          StringEquals:
            "iam:PassedToService": "cloudformation.amazonaws.com"
