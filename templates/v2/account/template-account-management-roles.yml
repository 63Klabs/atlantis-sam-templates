AWSTemplateFormatVersion: "2010-09-09"
Description: "Combined prefix-based IAM Service Roles and Managed Policies for Pipeline and Storage management - Assembled from reusable modules"

# Atlantis for AWS SAM Deployments
# Account Infrastructure Template
# Author: Chad Kluck - 63klabs.net
# Version: v0.0.0/2026-04-23

# Documentation, Issues/Feature Requests, Latest Updates, and Security Reports on GitHub:
# https://github.com/63klabs/atlantis-cfn-template-repo-for-serverless-deployments/

# This template combines the Pipeline Management and Storage Management
# service roles into a single stack. It uses reusable modules (snippets)
# stored in S3 via AWS::Include.
#
# Each module creates:
#   - A CloudFormation service role (assumed by cloudformation.amazonaws.com)
#   - A managed policy that grants iam:PassRole for that service role
#
# Both roles are prefix-scoped, restricting actions to resources named
# with the given Prefix.

# USE WITH:
# - Pipeline: template-pipeline.yml
#   - templates/v2/pipeline/template-pipeline.yml
# - Pipeline (Build Only): template-pipeline-build-only.yml
#   - templates/v2/pipeline/template-pipeline-build-only.yml
# - Pipeline (GitHub): template-pipeline-github.yml
#   - templates/v2/pipeline/template-pipeline-github.yml
# - Storage templates (S3, DynamoDB, Cache-Data)
#   - templates/v2/storage/

# =============================================================================
# META DATA
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-cloudformation-interface.html
#

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - E6101 # Resources from AWS::Include modules are not visible to cfn-lint
        - W2001 # Parameters consumed by AWS::Include modules appear unused
        - W8001 # Conditions consumed by AWS::Include modules appear unused
  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: "Application Resource Naming"
        Parameters:
          - Prefix
          - PrefixUpper
          - S3BucketNameOrgPrefix
          - ServiceRolePath
          - RolePath
      -
        Label:
          default: "External Resources"
        Parameters:
          - PermissionsBoundaryArn
      -
        Label:
          default: "Resources to Attach Managed Policies To"
        Parameters:
          - GroupNames
          - UserNames
          - RoleNames
      -
        Label:
          default: "Module Locations"
        Parameters:
          - PipelineMgmtRoleModuleUrl
          - PipelineMgmtPassrolePolicyModuleUrl
          - StorageMgmtRoleModuleUrl
          - StorageMgmtPassrolePolicyModuleUrl
          - NetworkCloudFrontMgmtPolicyModuleUrl
          - NetworkRoute53MgmtPolicyModuleUrl
          - NetworkCloudFrontMgmtRoleModuleUrl
          - NetworkCloudFrontMgmtPassrolePolicyModuleUrl
          - NetworkFullMgmtRoleModuleUrl
          - NetworkFullMgmtPassrolePolicyModuleUrl

# =============================================================================
# PARAMETERS
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/parameters-section-structure.html
#

Parameters:

  # ---------------------------------------------------------------------------
  # Application Resource Naming

  Prefix:
    Type: String
    Description: "Prefix pre-pended to all resources. This can be thought of as a Name Space used to identify ownership/access for teams, departments, etc. For example, resources named ws-* could belong to the web service team and could have IAM permissions to allow access to other ws-* resources. The Prefix must have a corresponding CloudFormation Service Role. Short, descriptive 2-6 character values work best. Due to resource naming length restrictions, length of Prefix + Project ID should not exceed 28 characters. Resources are named <Prefix>-<ProjectId>-<StageId>-<ResourceId>"
    Default: "acme"
    AllowedPattern: "^[a-z][a-z0-9-]{0,6}[a-z0-9]$"
    MinLength: 2
    MaxLength: 8
    ConstraintDescription: "2 to 8 characters. Lower case alphanumeric and dashes. Must start with a letter and end with a letter or number. Length of Prefix + Project ID should not exceed 28 characters."

  PrefixUpper:
    Type: String
    Description: "Prefix for Service Role in all UPPER CASE."
    Default: "ACME"
    AllowedPattern: "^[A-Z][A-Z0-9-]{0,6}[A-Z0-9]$"
    MinLength: 2
    MaxLength: 8
    ConstraintDescription: "2 to 8 characters. UPPER case alphanumeric and dashes. Must start with a letter and end with a letter or number."

  S3BucketNameOrgPrefix:
    Type: String
    Description: "By default, to enforce uniqueness, buckets include account and region in the bucket name. However, due to character limits, you can specify your own S3 prefix (like an org code). This will be used in addition to the Prefix entered above. Note that this length is shared with the recommended length of 20 characters for Resource Identifiers. So if you have a 10 character S3BucketNameOrgPrefix, you are limited to 10 characters for your bucket name identifier in your templates. Buckets are named <Prefix>-<Region>-<AccountId>-<ProjectId>-<StageId>-<ResourceId> or <S3OrgPrefix>-<Prefix>-<ProjectId>-<StageId>-<ResourceId>"
    Default: ""
    AllowedPattern: "^[a-z0-9][a-z0-9-]{0,18}[a-z0-9]$|^$"
    ConstraintDescription: "May be empty or 2 to 20 characters (8 or less recommended). Lower case alphanumeric and dashes. Must start and end with a letter or number."

  ServiceRolePath:
    Type: String
    Description: "Path to use for the Service Roles and Managed Policies. You may wish to provide a path to organize and base permissions on."
    Default: "/"
    AllowedPattern: "^\\/([a-zA-Z0-9-_]+[\\/])+$|^\\/$"
    ConstraintDescription: "May only contain alphanumeric characters, forward slashes, underscores, and dashes. Must begin and end with a slash."

  RolePath:
    Type: String
    Description: "Application Role Path to use for IAM Roles and Policies for Applications. You may wish to separate out your applications from users, or create separate paths per prefix or application. Specific paths may required by permission boundaries. Ex: /ws-hello-world-test/ or /app_role/"
    Default: "/"
    AllowedPattern: "^\\/([a-zA-Z0-9-_]+[\\/])+$|^\\/$"
    ConstraintDescription: "May only contain alphanumeric characters, forward slashes, underscores, and dashes. Must begin and end with a slash."

  # ---------------------------------------------------------------------------
  # External Resources

  PermissionsBoundaryArn:
    Type: String
    Description: "Permissions Boundary is a policy attached to a role to further restrict the permissions of the role. Your organization may or may not require boundaries. If left empty, no permissions boundary will be used."
    Default: ""
    AllowedPattern: "^$|^arn:aws:iam::\\d{12}:policy\\/[\\w+=,.@\\-\\/]*[\\w+=,.@\\-]+$"
    ConstraintDescription: "Must be empty or a valid IAM Policy ARN in the format: arn:aws:iam::{account_id}:policy/{policy_name}"

  # ---------------------------------------------------------------------------
  # Resources to Attach Managed Policies To

  GroupNames:
    Type: CommaDelimitedList
    Description: "Optional. Friendly Name (not ARN) of an existing IAM Group to attach the managed policies to. If left empty, no group will be attached."
    Default: ""
    AllowedPattern: "^[\\w+=,_.@\\-]+$|^$"
    ConstraintDescription: "Must be empty or a comma delimited list of valid IAM Group names."

  RoleNames:
    Type: CommaDelimitedList
    Description: "Optional. Friendly Name (not ARN) of an existing IAM Role to attach the managed policies to. If left empty, no role will be attached."
    Default: ""
    AllowedPattern: "^[\\w+=,_.@\\-]+$|^$"
    ConstraintDescription: "Must be empty or a comma delimited list of valid IAM Role names."

  UserNames:
    Type: CommaDelimitedList
    Description: "Optional. Friendly Name (not ARN) of an existing IAM User to attach the managed policies to. If left empty, no user will be attached."
    Default: ""
    AllowedPattern: "^[\\w+=,_.@\\-]+$|^$"
    ConstraintDescription: "Must be empty or a comma delimited list of valid IAM User names."

  # ---------------------------------------------------------------------------
  # Module Locations (S3 URLs for AWS::Include snippets)

  PipelineMgmtRoleModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

  PipelineMgmtPassrolePolicyModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

  StorageMgmtRoleModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

  StorageMgmtPassrolePolicyModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

  NetworkCloudFrontMgmtPolicyModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

  NetworkRoute53MgmtPolicyModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

  NetworkCloudFrontMgmtRoleModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

  NetworkCloudFrontMgmtPassrolePolicyModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

  NetworkFullMgmtRoleModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

  NetworkFullMgmtPassrolePolicyModuleUrl:
    Type: String
    AllowedPattern: "^s3:\\/\\/[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*\\.yml$"
    ConstraintDescription: "Must be a valid S3 URI pointing to a .yml file."

# =============================================================================
# CONDITIONS
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/intrinsic-function-reference-conditions.html
#

Conditions:
  UseS3BucketNameOrgPrefix: !Not [!Equals [!Ref S3BucketNameOrgPrefix, ""]]
  HasPermissionsBoundaryArn: !Not [!Equals [!Ref PermissionsBoundaryArn, ""]]
  HasGroupNames: !Not [!Equals [!Join ["", !Ref GroupNames], ""]]
  HasRoleNames: !Not [!Equals [!Join ["", !Ref RoleNames], ""]]
  HasUserNames: !Not [!Equals [!Join ["", !Ref UserNames], ""]]

# =============================================================================
# RESOURCES
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
#

Resources:

  # -- Pipeline Management --
  PrefixBasedCloudFormationPipelineMgmtServiceRole:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref PipelineMgmtRoleModuleUrl

  PrefixBasedPipelineMgmtManagedPolicy:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref PipelineMgmtPassrolePolicyModuleUrl

  # -- Storage Management --
  PrefixBasedCloudFormationStorageMgmtServiceRole:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref StorageMgmtRoleModuleUrl

  PrefixBasedStorageMgmtManagedPolicy:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref StorageMgmtPassrolePolicyModuleUrl

  # -- Network CloudFront Management Policy --
  PrefixBasedNetworkCloudFrontMgmtPolicy:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref NetworkCloudFrontMgmtPolicyModuleUrl

  # -- Network Route53 Management Policy --
  PrefixBasedNetworkRoute53MgmtPolicy:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref NetworkRoute53MgmtPolicyModuleUrl

  # -- Network CloudFront Management Role (Developer) --
  PrefixBasedCloudFormationNetworkCloudFrontMgmtServiceRole:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref NetworkCloudFrontMgmtRoleModuleUrl

  PrefixBasedNetworkCloudFrontMgmtManagedPolicy:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref NetworkCloudFrontMgmtPassrolePolicyModuleUrl

  # -- Full Network Management Role (CloudFront + Route53) --
  PrefixBasedCloudFormationNetworkFullMgmtServiceRole:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref NetworkFullMgmtRoleModuleUrl

  PrefixBasedNetworkFullMgmtManagedPolicy:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Ref NetworkFullMgmtPassrolePolicyModuleUrl

# =============================================================================
# OUTPUTS
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/outputs-section-structure.html
#
# Place anything interesting that you would like to quickly refer to in
# your cloudformation OUTPUT section. Test URLs, direct links to resources, etc
#

Outputs:

  # ---------------------------------------------------------------------------
  # Pipeline Management

  PipelineMgmtServiceRoleArn:
    Description: "The ARN of the Prefix-based CloudFormation Service Role for Pipeline Management"
    Value: !GetAtt PrefixBasedCloudFormationPipelineMgmtServiceRole.Arn
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Pipeline-Mgmt-Service-Role-Arn"

  PipelineMgmtServiceRoleName:
    Description: "The Name of the Prefix-based CloudFormation Service Role for Pipeline Management"
    Value: !Ref PrefixBasedCloudFormationPipelineMgmtServiceRole
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Pipeline-Mgmt-Service-Role-Name"

  PipelineMgmtManagedPolicyArn:
    Description: "The ARN of the Pipeline Management Managed Policy"
    Value: !Ref PrefixBasedPipelineMgmtManagedPolicy
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Pipeline-Mgmt-Service-ManagedPolicy-Arn"

  PipelineMgmtManagedPolicyName:
    Description: "The Name of the Pipeline Management Managed Policy"
    Value: !Ref PrefixBasedPipelineMgmtManagedPolicy
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Pipeline-Mgmt-Service-ManagedPolicy-Name"

  # ---------------------------------------------------------------------------
  # Storage Management

  StorageMgmtServiceRoleArn:
    Description: "The ARN of the Prefix-based CloudFormation Service Role for Storage Management"
    Value: !GetAtt PrefixBasedCloudFormationStorageMgmtServiceRole.Arn
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Storage-Mgmt-Service-Role-Arn"

  StorageMgmtServiceRoleName:
    Description: "The Name of the Prefix-based CloudFormation Service Role for Storage Management"
    Value: !Ref PrefixBasedCloudFormationStorageMgmtServiceRole
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Storage-Mgmt-Service-Role-Name"

  StorageMgmtManagedPolicyArn:
    Description: "The ARN of the Storage Management Managed Policy"
    Value: !Ref PrefixBasedStorageMgmtManagedPolicy
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Storage-Mgmt-Service-ManagedPolicy-Arn"

  StorageMgmtManagedPolicyName:
    Description: "The Name of the Storage Management Managed Policy"
    Value: !Ref PrefixBasedStorageMgmtManagedPolicy
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Storage-Mgmt-Service-ManagedPolicy-Name"

  # ---------------------------------------------------------------------------
  # Network CloudFront Management (Developer)

  NetworkCloudFrontMgmtServiceRoleArn:
    Description: "The ARN of the Network CloudFront Management Service Role (no Route53)"
    Value: !GetAtt PrefixBasedCloudFormationNetworkCloudFrontMgmtServiceRole.Arn
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Network-CloudFront-Mgmt-Service-Role-Arn"

  NetworkCloudFrontMgmtServiceRoleName:
    Description: "The Name of the Network CloudFront Management Service Role"
    Value: !Ref PrefixBasedCloudFormationNetworkCloudFrontMgmtServiceRole
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Network-CloudFront-Mgmt-Service-Role-Name"

  NetworkCloudFrontMgmtManagedPolicyArn:
    Description: "The ARN of the Network CloudFront Management Managed Policy"
    Value: !Ref PrefixBasedNetworkCloudFrontMgmtManagedPolicy
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Network-CloudFront-Mgmt-ManagedPolicy-Arn"

  # ---------------------------------------------------------------------------
  # Full Network Management (CloudFront + Route53)

  NetworkFullMgmtServiceRoleArn:
    Description: "The ARN of the Full Network Management Service Role (CloudFront + Route53)"
    Value: !GetAtt PrefixBasedCloudFormationNetworkFullMgmtServiceRole.Arn
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Network-Full-Mgmt-Service-Role-Arn"

  NetworkFullMgmtServiceRoleName:
    Description: "The Name of the Full Network Management Service Role"
    Value: !Ref PrefixBasedCloudFormationNetworkFullMgmtServiceRole
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Network-Full-Mgmt-Service-Role-Name"

  NetworkFullMgmtManagedPolicyArn:
    Description: "The ARN of the Full Network Management Managed Policy"
    Value: !Ref PrefixBasedNetworkFullMgmtManagedPolicy
    Export:
      Name: !Sub "${PrefixUpper}-CloudFormation-Network-Full-Mgmt-ManagedPolicy-Arn"

  # ---------------------------------------------------------------------------
  # Console Links

  IAMRolesConsole:
    Description: "IAM Roles in AWS Console"
    Value: !Sub "https://console.aws.amazon.com/iam/home#/roles"

  IAMPoliciesConsole:
    Description: "IAM Policies in AWS Console"
    Value: !Sub "https://console.aws.amazon.com/iam/home#/policies"
