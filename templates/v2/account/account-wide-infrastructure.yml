AWSTemplateFormatVersion: "2010-09-09"
Description: "Account-wide resources: ABAC-scoped managed policies and shared connections - Assembled from reusable modules"

# 63Klabs Atlantis DevOps Platform for AWS SAM Deployments
# Account-Wide Infrastructure Template
# Author: Chad Kluck - 63klabs.net
# Version: v0.0.0/2026-04-28

# Documentation, Issues/Feature Requests, Latest Updates, and Security Reports on GitHub:
# https://github.com/63klabs/atlantis-sam-templates/

# This template assembles account-wide resources for project pipelines from
# reusable modules (snippets) stored in S3. It includes:
#   - ABAC-scoped managed policies for CloudFormation service roles
#   - Shared connections (e.g., GitHub via CodeConnections)
#
# Managed policies are scoped via ABAC using the
# atlantis:ApplicationDeploymentId tag on the principal. The resulting
# managed policy ARNs are exported so that pipeline templates can attach
# them to their CloudFormation service roles.
#
# Each snippet references parameters from this template. Policy snippets
# use OrgPrefix and RolePath. Account-Wide snippets use OrgPrefix and
# service-specific parameters (e.g., GitHubOrg).

# =============================================================================
# META DATA
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-cloudformation-interface.html
#

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - E3001 # Resource Type property is defined inside AWS::Include modules
        - E3005 # Resource names resolved at deploy time via AWS::Include transforms
        - E6101 # Resources from AWS::Include modules are not visible to cfn-lint
        - W2001 # Parameters consumed by AWS::Include modules appear unused
        - W8001 # Conditions consumed by AWS::Include modules appear unused
  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: "Organization Naming"
        Parameters:
          - OrgPrefix
      -
        Label:
          default: "IAM Configuration"
        Parameters:
          - RolePath
      -
        Label:
          default: "GitHub Connection"
        Parameters:
          - GitHubOrg
      -
        Label:
          default: "API Gateway"
        Parameters:
          - EnableApiGwCloudWatchLogs
      -
        Label:
          default: "Module Source"
        Parameters:
          - S3ModuleLocation

# =============================================================================
# PARAMETERS
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/parameters-section-structure.html
#

Parameters:

  # ---------------------------------------------------------------------------
  # Organization Naming

  OrgPrefix:
    Type: String
    Description: "Organization-level prefix prepended to managed policy names for identification and grouping. For example, 'ACME' would produce policy names like 'ACME-ProjectPipeline-CodeBuildCrud'."
    Default: "ACME"
    AllowedPattern: "^[A-Z][A-Z0-9-]{0,18}[A-Z0-9]$"
    MinLength: 2
    MaxLength: 20
    ConstraintDescription: "2 to 20 characters. Upper case alphanumeric and dashes. Must start with a letter and end with a letter or number."

  # ---------------------------------------------------------------------------
  # IAM Configuration

  RolePath:
    Type: String
    Description: "Path to use for IAM Managed Policies created by this template. Use to organize policies within your IAM structure."
    Default: "/"
    AllowedPattern: "^\\/([a-zA-Z0-9-_]+[\\/])+$|^\\/$"
    ConstraintDescription: "May only contain alphanumeric characters, forward slashes, underscores, and dashes. Must begin and end with a slash."

  # ---------------------------------------------------------------------------
  # Module Source

  S3ModuleLocation:
    Type: String
    Description: "S3 bucket name and namespace prefix for module snippets (without s3:// prefix or trailing slash). Modules are loaded from s3://<S3ModuleLocation>/templates/v2/modules/*"
    Default: "63klabs/atlantis"
    AllowedPattern: "^[a-zA-Z0-9][a-zA-Z0-9\\-]{1,61}[a-zA-Z0-9]\\/.*[^\\/]$"
    ConstraintDescription: "Must be a valid S3 bucket/path without s3:// prefix or trailing slash (e.g., my-bucket/path/to/modules)."

  # ---------------------------------------------------------------------------
  # GitHub Connection

  GitHubOrg:
    Type: String
    Description: "GitHub organization or username to connect to. Leave empty to skip creating a GitHub connection."
    Default: ""

  # ---------------------------------------------------------------------------
  # API Gateway

  EnableApiGwCloudWatchLogs:
    Type: String
    Description: "Set to 'true' to create the account-level IAM role and API Gateway Account configuration required for API Gateway to push logs to CloudWatch. This is a one-time, per-account, per-region setup."
    Default: "false"
    AllowedValues: ["true", "false"]
    ConstraintDescription: "Must be 'true' or 'false'."

# =============================================================================
# CONDITIONS
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/intrinsic-function-reference-conditions.html
#

Conditions:
  HasGitHubOrg: !Not [!Equals [!Ref GitHubOrg, ""]]
  EnableApiGatewayLogging: !Equals [!Ref EnableApiGwCloudWatchLogs, "true"]

# =============================================================================
# RESOURCES
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
#

Resources:

  # -- CodeBuild and Logs CRUD Policy (ABAC-Scoped) --
  CloudFormationCodeBuildPolicy:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Sub "s3://${S3ModuleLocation}/templates/v2/modules/pipeline-policies/codebuild-crud.yml"

  # -- Cognito User Pool CRUD Policy (ABAC-Scoped) --
  CloudFormationCognitoPolicy:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Sub "s3://${S3ModuleLocation}/templates/v2/modules/pipeline-policies/cognito-crud.yml"

  # -- GitHub Connection (Conditional) --
  GitHubConnection:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Sub "s3://${S3ModuleLocation}/templates/v2/modules/account-wide/codeconnections-github.yml"

  # -- API Gateway CloudWatch Role (Conditional) --
  ApiGatewayCloudWatchLogsRole:
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Sub "s3://${S3ModuleLocation}/templates/v2/modules/account-wide/apigw-cloudwatch-role.yml"

  # -- API Gateway Account Configuration (Conditional) --
  ApiGatewayAccount:
    DependsOn: ApiGatewayCloudWatchLogsRole
    Fn::Transform:
      Name: AWS::Include
      Parameters:
        Location: !Sub "s3://${S3ModuleLocation}/templates/v2/modules/account-wide/apigw-cloudwatch-account.yml"

# =============================================================================
# OUTPUTS
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/outputs-section-structure.html
#
# Place anything interesting that you would like to quickly refer to in
# your cloudformation OUTPUT section. Test URLs, direct links to resources, etc
#

Outputs:

  # ---------------------------------------------------------------------------
  # CodeBuild CRUD Policy

  CodeBuildCrudPolicyArn:
    Description: "ARN of the CodeBuild CRUD managed policy. Pass this to pipeline templates via CodeBuildSvcRoleIncludeManagedPolicyArns or the CloudFormation service role managed policy parameter."
    Value: !Ref CloudFormationCodeBuildPolicy
    Export:
      Name: !Sub "${OrgPrefix}-ProjectPipeline-CodeBuildCrud-Arn"

  CodeBuildCrudPolicyName:
    Description: "Name of the CodeBuild CRUD managed policy"
    Value: !Sub "${OrgPrefix}-ProjectPipeline-CodeBuildCrud"

  # ---------------------------------------------------------------------------
  # Cognito CRUD Policy

  CognitoCrudPolicyArn:
    Description: "ARN of the Cognito CRUD managed policy. Pass this to pipeline templates via the CloudFormation service role managed policy parameter."
    Value: !Ref CloudFormationCognitoPolicy
    Export:
      Name: !Sub "${OrgPrefix}-ProjectPipeline-CognitoCrud-Arn"

  CognitoCrudPolicyName:
    Description: "Name of the Cognito CRUD managed policy"
    Value: !Sub "${OrgPrefix}-ProjectPipeline-CognitoCrud"

  # ---------------------------------------------------------------------------
  # GitHub Connection

  GitHubConnectionArn:
    Condition: HasGitHubOrg
    Description: "ARN of the GitHub connection. Pass this to pipeline templates via GitHubConnectionArn. Note: You must manually complete the connection in the AWS Console."
    Value: !Ref GitHubConnection
    Export:
      Name: !Sub "${OrgPrefix}-GitHub-Connection-Arn"

  GitHubConnectionStatus:
    Condition: HasGitHubOrg
    Description: "Status of the GitHub connection (PENDING until manually authorized)"
    Value: !GetAtt GitHubConnection.ConnectionStatus

  CodeConnectionsConsole:
    Condition: HasGitHubOrg
    Description: "URL to complete the GitHub connection setup in the AWS Console"
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/settings/connections"

  # ---------------------------------------------------------------------------
  # API Gateway CloudWatch Logging

  ApiGatewayCloudWatchLogsRoleArn:
    Condition: EnableApiGatewayLogging
    Description: "ARN of the IAM role used by API Gateway to push logs to CloudWatch"
    Value: !GetAtt ApiGatewayCloudWatchLogsRole.Arn
    Export:
      Name: !Sub "${OrgPrefix}-ApiGateway-CloudWatch-Role-Arn"

  # ---------------------------------------------------------------------------
  # Console Links

  IamPoliciesConsole:
    Description: "IAM Policies in AWS Console"
    Value: !Sub "https://console.aws.amazon.com/iam/home#/policies"
